<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>WebView Iframe Test</title>

<style>
body {
    margin: 0;
    background: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
}

#ad-container {
    width: 300px;
    height: 250px;
    display: flex;
    justify-content: center;
    align-items: center;
}

#ad-container iframe {
    width: 300px;
    height: 250px;
    border: none;
}

.reward-btn {
    margin-top: 48px;
    width: 240px;
    height: 48px;
    background: #4CAF50;
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    font-weight: bold;
    box-sizing: border-box;
}
</style>
</head>

<body>

<div id="ad-container">
    <iframe
        src="https://www.mobwithad.com/api/banner/app/adwon/v2/adwon?zone=10894055&output=html&count=&w=300&h=250&adid=14c37bad-061b-4d47-9256-25aae1ff6a5d&auid=&clientIp=&userAdTrackingYn=Y"
        scrolling="no">
    </iframe>
</div>

<a class="reward-btn" href="app://reward">
    광고 보고 적립하기
</a>

</body>
</html>
