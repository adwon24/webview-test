<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>WebView Iframe Test</title>

<style>
html,
body {
    width: 100%;
    height: 100%;
    margin: 0;
    background: #ffffff;
    font-family: Arial, sans-serif;
}

body {
    overflow: hidden;
}

/* 광고 영역 */
#ad-container {
    position: fixed;
    left: 50%;
    top: 50%;
    width: 300px;
    height: 250px;
    transform: translate(-50%, -50%);
}

#ad-container iframe {
    width: 300px;
    height: 250px;
    border: 0;
}

/* 하단 버튼 */
.reward-btn {
    position: fixed;
    left: 16px;
    right: 16px;

    bottom: max(10px, env(safe-area-inset-bottom));

    height: 52px;

    display: flex;
    align-items: center;
    justify-content: center;

    background: #4CAF50;
    color: #FFFFFF;

    text-decoration: none;
    font-size: 18px;
    font-weight: bold;

    border-radius: 8px;

    box-sizing: border-box;

    -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>

<div id="ad-container">
    <iframe
        src="https://www.mobwithad.com/api/banner/app/adwon/v2/adwon?zone=10894055&output=html&count=&w=300&h=250&adid=14c37bad-061b-4d47-9256-25aae1ff6a5d&auid=&clientIp=&userAdTrackingYn=Y"
        scrolling="no">
    </iframe>
</div>

<a class="reward-btn" href="app://reward">
    광고 보고 적립하기
</a>

</body>
</html>
